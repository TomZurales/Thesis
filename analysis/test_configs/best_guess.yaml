name: Final Analysis using Best Guess Parameters 2
datasets:
  - "all_days"
  - "all_machine_halls"
  # - "all_vicon_room_1"
  # - "all_vicon_room_2"
  - "big_skip"
  # - "machine_hall_1_5"
  # - "small_skips"
modes:
  - "baseline"
  - "vbee"
  # - "vbee_fake"
  - "vbee_ransac"
  - "random_cull"
  # - "random_cull_fake"
iterations: 10

# VBEE Configuration
n: 100
k: 10
distance_threshold: 5.0
unknown_psge_value: 0.5
min_confidence_threshold: 0.2
max_error_threshold: 0.2
init_p_e: 0.9
bad_threshold: 0.4
damping_coeff: 0.65
init_observability: 0.5
observability_damping_coeff: 0.21
sigmoid_midpoint: 100.43
sigmoid_steepness: 3.91
falseNegativeRate: 0.26
falsePositiveRate: 0.005